name: OnePlus 9RT Kernel 5.4 + KernelSU-Next

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_MAXSIZE: "2G"

    steps:
      - uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Dependencies
      # ------------------------------------------------------------
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git bc bison flex libssl-dev libelf-dev \
            build-essential ccache curl zip unzip \
            lz4 cpio device-tree-compiler \
            llvm lld \
            python3

      # ------------------------------------------------------------
      # REAL PYTHON2 (REQUIRED FOR DTBO)
      # ------------------------------------------------------------
      - name: Install Python 2.7 (DTBO requirement)
        run: |
          sudo apt update
          sudo apt install -y python2-minimal || sudo apt install -y python2
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      # ------------------------------------------------------------
      # Proton Clang
      # ------------------------------------------------------------
      - name: Setup Proton Clang
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang clang
          echo "$(pwd)/clang/bin" >> $GITHUB_PATH

      # ------------------------------------------------------------
      # Kernel Source
      # ------------------------------------------------------------
      - name: Clone kernel source
        run: |
          git clone --depth=1 \
            https://github.com/beet-stuffs/android_kernel_oneplus_sm8350.git \
            -b fourteen-qpr2 kernel

      # ------------------------------------------------------------
      # KernelSU-Next (OFFICIAL METHOD)
      # ------------------------------------------------------------
      - name: Setup KernelSU-Next
        run: |
          cd kernel
          curl -LSs \
            "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" \
            | bash -

      - name: Enable KernelSU in defconfig
        run: |
          cd kernel
          scripts/config --file arch/arm64/configs/vendor/lahaina-qgki_defconfig -e KSU
          scripts/config --file arch/arm64/configs/vendor/lahaina-qgki_defconfig -d KSU_DEBUG

      # ------------------------------------------------------------
      # Build Kernel (HOST LINKER FIX INCLUDED)
      # ------------------------------------------------------------
      - name: Build kernel
        run: |
          cd kernel

          export ARCH=arm64
          export SUBARCH=arm64

          export CC="ccache clang"
          export CXX="ccache clang++"

          export LLVM=1
          export LLVM_IAS=1

          # CRITICAL: use system linker for host tools
          export LD=ld.lld
          export HOSTLD=ld.lld

          # prevent Proton ld from leaking into host builds
          export PATH=$(echo "$PATH" | tr ':' '\n' | grep -v clang | paste -sd ':' -)

          make O=out vendor/lahaina-qgki_defconfig
          make -j$(nproc) O=out

      # ------------------------------------------------------------
      # AnyKernel3
      # ------------------------------------------------------------
      - name: Create AnyKernel3 zip
        run: |
          cd kernel
          git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          zip -r OnePlus9RT-KernelSU-Next.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OnePlus9RT-KernelSU-Next
          path: kernel/AnyKernel3/OnePlus9RT-KernelSU-Next.zip
