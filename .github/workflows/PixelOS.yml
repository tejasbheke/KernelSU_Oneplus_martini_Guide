name: KernelSU-Next OnePlus 9RT (martini)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ARCH: arm64
      SUBARCH: arm64
      LLVM: 1
      LLVM_IAS: 1
      PYTHON: python3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison flex \
            build-essential \
            clang lld llvm \
            git curl zip unzip \
            libssl-dev \
            ccache \
            python3 python3-pip

      - name: Setup Proton Clang
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
          echo "$PWD/clang/bin" >> $GITHUB_PATH

      - name: Clone kernel source (5.4)
        run: |
          git clone --depth=1 -b fourteen-qpr2 \
            https://github.com/beet-stuffs/android_kernel_oneplus_sm8350.git \
            kernel

      - name: Setup KernelSU-Next v3
        run: |
          cd kernel
          git clone https://github.com/KernelSU-Next/KernelSU-Next.git
          cd KernelSU-Next
          git checkout v3
          cd ..
          bash KernelSU-Next/kernel/setup.sh

          scripts/config --file arch/arm64/configs/vendor/lahaina-qgki_defconfig \
            -e CONFIG_KSU \
            -e MODULES \
            -e KPROBES \
            -e HAVE_KPROBES \
            -e KPROBE_EVENTS

      - name: Build kernel
        run: |
          cd kernel

          export CC="ccache clang"
          export CXX="ccache clang++"
          export LD=ld.lld
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          make O=out vendor/lahaina-qgki_defconfig
          make -j$(nproc) O=out

      - name: Create AnyKernel3 zip
        run: |
          cd kernel
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          cp out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          zip -r KernelSU-Next-martini.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU-Next-martini
          path: kernel/AnyKernel3/KernelSU-Next-martini.zip
