name: PixelOS OnePlus 9RT KernelSU-Next

on:
  workflow_dispatch:
    inputs:
      KERNEL_SOURCE:
        description: "Kernel Source"
        required: true
        default: "https://github.com/beet-stuffs/android_kernel_oneplus_sm8350.git"
        type: string
      KERNEL_SOURCE_BRANCH:
        description: "Kernel Branch"
        required: true
        default: "fourteen-qpr2"
        type: string
      KERNEL_DEFCONFIG:
        description: "Kernel Defconfig"
        required: true
        default: "vendor/lahaina-qgki_defconfig"
        type: string
      KERNELSU_CONFIG:
        description: "Enable KernelSU-Next"
        required: true
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_MAXSIZE: "2G"

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git bc bison flex libssl-dev libelf-dev \
            build-essential ccache curl zip unzip \
            python3 lz4 cpio device-tree-compiler \
            llvm lld

      - name: Setup Proton Clang
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang clang
          echo "$(pwd)/clang/bin" >> $GITHUB_PATH

      - name: Clone kernel source
        run: |
          git clone --depth=1 \
            ${{ github.event.inputs.KERNEL_SOURCE }} \
            -b ${{ github.event.inputs.KERNEL_SOURCE_BRANCH }} \
            kernel

      - name: Setup KernelSU-Next (official)
        if: github.event.inputs.KERNELSU_CONFIG == 'true'
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -

      - name: Enable KernelSU in defconfig
        if: github.event.inputs.KERNELSU_CONFIG == 'true'
        run: |
          cd kernel
          scripts/config --file arch/arm64/configs/${{ github.event.inputs.KERNEL_DEFCONFIG }} -e KSU
          scripts/config --file arch/arm64/configs/${{ github.event.inputs.KERNEL_DEFCONFIG }} -d KSU_DEBUG

      - name: Build kernel
        run: |
          cd kernel

          export ARCH=arm64
          export SUBARCH=arm64

          export CC="ccache clang"
          export CXX="ccache clang++"

          export LLVM=1
          export LLVM_IAS=1

          # CRITICAL: force system linker
          export LD=ld.lld
          export HOSTLD=ld.lld

          # remove proton ld from PATH for host tools
          export PATH=$(echo "$PATH" | tr ':' '\n' | grep -v clang | paste -sd ':' -)

          make O=out ${{ github.event.inputs.KERNEL_DEFCONFIG }}
          make -j$(nproc) O=out

      - name: Create AnyKernel3 zip
        run: |
          cd kernel
          git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cp out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          zip -r PixelOS-martini-KernelSU-Next.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PixelOS-martini-KernelSU-Next
          path: kernel/AnyKernel3/PixelOS-martini-KernelSU-Next.zip
